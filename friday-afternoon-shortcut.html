<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Friday Afternoon Shortcut — AI Privacy Activity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    font-family:'Raleway', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background:#eceef3; color:#191246;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  a{ color:#336633; } a:hover{ color:#264d26; }
  @keyframes slideUp { from { opacity:0; transform:translateY(22px);} to { opacity:1; transform:translateY(0);} }
  @keyframes fadeIn { from { opacity:0;} to { opacity:1;} }

  .wrap{ min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:32px 20px; }
  .card{
    width:100%; max-width:960px; background:#fff; border:1px solid #e4e6ee;
    border-radius:20px; box-shadow:0 24px 60px rgba(25,18,70,0.12); overflow:hidden;
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 30px; border-bottom:1px solid #eef0f5;
  }
  .brand{ font-size:13px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:#191246; }
  .progress{ display:flex; align-items:center; gap:10px; }
  .progress .p{ display:flex; align-items:center; gap:8px; }
  .progress .d{ width:9px; height:9px; border-radius:50%; }
  .progress .t{ font-size:12px; font-weight:600; }
  .content{ padding:38px 44px 46px; }

  button{ font-family:inherit; }
  .hot{ transition:border-color .12s ease, background .12s ease; }

  @media (max-width:720px){
    .content{ padding:28px 20px 34px; }
    .topbar{ padding:14px 18px; }
    .progress .t{ display:none; }
    .grid2{ grid-template-columns:1fr !important; }
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; }
  }
</style>
</head>

  function stingUnlocked(regs){
    var nonSting = regs.map(function(r,i){return {r:r,i:i};}).filter(function(x){return !x.r.sting;});
    return state.revealed || nonSting.every(function(x){ return state.found.indexOf(x.i)>=0; });
  }

  function screenFind(){
    var r = CONFIG.rounds[state.ri];
    var regs = r.regions || [];
    var stingOk = stingUnlocked(regs);
    var introLine = state.choice==='sent' ? r.introSent : r.introDeclined;

    // scene
    var scene = '';
    if(r.mode==='camera'){
      var hots = regs.map(function(reg,idx){
        var found = state.found.indexOf(idx)>=0;
        var missed = state.revealed && !found;
        var st = pct(reg)+'background:transparent;border:2px dashed transparent;border-radius:5px;cursor:pointer;padding:0;';
        if(found) st = pct(reg)+'border:2.5px solid #336633;background:rgba(51,102,51,0.14);border-radius:5px;cursor:pointer;padding:0;';
        else if(missed) st = pct(reg)+'border:2.5px dashed #b4381f;background:rgba(180,56,31,0.10);border-radius:5px;cursor:pointer;padding:0;';
        var badge = (found||missed) ? '<span style="position:absolute;top:-11px;left:-11px;width:22px;height:22px;border-radius:50%;background:'+(found?'#336633':'#b4381f')+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;">'+(idx+1)+'</span>' : '';
        var aria = found ? reg.label : ('Hidden detail '+(idx+1));

    } else { // voice room
      var chips = regs.map(function(reg,idx){
        var found = state.found.indexOf(idx)>=0;

        var chipStyle = 'position:absolute;left:'+pos.left+';top:'+pos.top+';transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:4px;max-width:120px;text-align:center;border:none;background:transparent;cursor:'+(locked?'default':'pointer')+';opacity:'+(locked?0.28:1)+';padding:4px;';
        var markerBg = found ? '#336633' : (missed ? '#b4381f' : (reg.sting ? '#191246' : '#666'));
        var markerStyle = 'width:30px;height:30px;border-radius:50%;background:'+markerBg+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;box-shadow:0 3px 8px rgba(25,18,70,0.3);';

        '<div style="position:absolute;left:6%;top:30%;width:22%;height:9%;background:#dfe3ec;border-radius:4px;"></div>'+
        '<div style="position:absolute;left:70%;top:66%;width:24%;height:9%;background:#dfe3ec;border-radius:4px;"></div>'+

          '<div style="width:44px;height:44px;border-radius:50%;background:#336633;margin:0 auto;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(51,102,51,0.42);"><svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.92V21a1 1 0 1 0 2 0v-3.08A7 7 0 0 0 19 11z"/></svg></div>'+

        '<div style="display:flex;flex-direction:column;gap:12px;min-height:60px;">'+listCol+'</div>'+

  function screenReceipt(){
    var r = CONFIG.rounds[state.ri];
    var rows = r.disclosed.map(function(d){
      return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:baseline;padding:13px 0;border-top:1px solid #eef0f5;">'+

  function screenRewrite(){

    var pool = rw.chips.map(function(c,i){return {c:c,i:i};}).filter(function(x){ return state.assign[x.i]===undefined; });
    var poolHtml = pool.map(function(x){
      var sel = state.selChip===x.i;
      var st = 'border:1px solid #d3d7e2;background:'+(sel?'#191246':'#fff')+';color:'+(sel?'#fff':'#191246')+';border-radius:20px;padding:8px 15px;font-size:13.5px;font-weight:500;cursor:grab;';
      return '<button data-i="'+x.i+'" data-action="selectChip" draggable="true" style="'+st+'">'+esc(x.c.text)+'</button>';
    }).join('');
    if(pool.length===0) poolHtml += '<span style="font-size:13px;color:#9a9aa4;align-self:center;">All fragments placed — check your answer.</span>';

    function zone(zoneName){
      return rw.chips.map(function(c,i){return {c:c,i:i};}).filter(function(x){ return state.assign[x.i]===zoneName; }).map(function(x){
        var c=x.c;
        var correct = state.checked && (c.keep?'keep':'cut')===zoneName;
        var iconStyle = 'width:20px;height:20px;flex:none;border-radius:50%;display:'+(state.checked?'flex':'none')+';align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;background:'+(correct?'#336633':'#b0b4bf')+';';
        var placedStyle = 'background:#fff;border:1px solid '+(state.checked?(correct?'#cfe0cf':'#e2e4ea'):'#e2e4ea')+';border-radius:10px;padding:11px 13px;';
        var why = state.checked ? '<p style="margin:5px 0 0 24px;font-size:12.5px;color:#5c5c67;line-height:1.4;">'+esc(c.why)+'</p>' : '';
        return '<div style="'+placedStyle+'">'+
          '<div style="display:flex;align-items:center;gap:8px;"><span style="'+iconStyle+'">'+(state.checked?(correct?'✓':'✕'):'')+'</span><span style="font-size:13.5px;font-weight:500;color:#191246;">'+esc(c.text)+'</span></div>'+why+
        '</div>';
      }).join('');
    }

    var allAssigned = Object.keys(state.assign).length===rw.chips.length;
    var checkBlock = !state.checked ?
      '<button data-action="check" style="padding:14px 38px;border:none;border-radius:12px;background:#191246;color:#fff;font-size:16px;font-weight:600;cursor:pointer;opacity:'+(allAssigned?1:0.5)+';">Check</button>'+
      '<p style="margin:12px 0 0;font-size:13px;color:#9a9aa4;">Click a fragment, then click a zone — or drag it across.</p>' : '';

    var reveal = state.checked ?
      '<div style="margin-top:28px;'+anim('slideUp .4s ease')+'">'+
        '<div style="border:1px solid #cfe0cf;background:#f1f6f1;border-radius:14px;padding:22px 26px;">'+
          '<div style="font-size:12px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#336633;margin-bottom:10px;">The safe prompt</div>'+
          '<p style="margin:0 0 14px;font-size:17px;line-height:1.6;color:#191246;">“'+esc(rw.safePrompt)+'”</p>'+
          '<p style="margin:0;font-size:14.5px;line-height:1.55;color:#4a4a55;">'+esc(rw.payoff)+'</p>'+
        '</div>'+
        '<div style="text-align:center;margin-top:24px;"><button data-action="afterRewrite" style="padding:14px 38px;border:none;border-radius:12px;background:#336633;color:#fff;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 8px 20px rgba(51,102,51,0.24);">Continue</button></div>'+
      '</div>' : '';

    return '<div style="'+entry('fadeIn .35s ease')+'">'+
      '<div style="text-align:center;max-width:640px;margin:0 auto 24px;">'+
        '<div style="font-size:12px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#336633;margin-bottom:10px;">The rewrite</div>'+
        '<p style="margin:0;font-size:18px;line-height:1.55;color:#191246;">'+esc(rw.prompt)+'</p>'+
      '</div>'+
      '<div id="pool" style="min-height:56px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:24px;padding:14px;background:#f7f8fb;border:1px dashed #d9dce4;border-radius:12px;">'+poolHtml+'</div>'+
      '<div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">'+
        '<div data-zone="keep" style="border:2px solid #cfe0cf;background:#f1f6f1;border-radius:14px;padding:16px;min-height:180px;">'+
          '<div style="font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#336633;margin-bottom:12px;">Keep — describes the problem</div>'+
          '<div style="display:flex;flex-direction:column;gap:9px;">'+zone('keep')+'</div>'+
        '</div>'+
        '<div data-zone="cut" style="border:2px solid #e0d3d3;background:#faf4f4;border-radius:14px;padding:16px;min-height:180px;">'+
          '<div style="font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#8a5a5a;margin-bottom:12px;">Cut — identifies the client</div>'+
          '<div style="display:flex;flex-direction:column;gap:9px;">'+zone('cut')+'</div>'+
        '</div>'+
      '</div>'+
      '<div style="text-align:center;margin-top:24px;">'+checkBlock+'</div>'+
      reveal+
    '</div>';
  }

  function screenTakeaway(){
    var tk = CONFIG.takeaway;
    return '<div style="'+entry('slideUp .4s ease')+'">'+
      '<div style="background:#191246;border-radius:18px;padding:44px 46px;color:#fff;">'+
        '<h1 style="margin:0 0 16px;font-size:36px;line-height:1.1;font-weight:700;letter-spacing:-0.01em;">'+esc(tk.headline)+'</h1>'+
        '<p style="margin:0 0 20px;font-size:19px;line-height:1.55;color:#d7d5ea;">'+esc(tk.sub)+'</p>'+
        '<div style="height:1px;background:rgba(255,255,255,0.16);margin:0 0 20px;"></div>'+
        '<p style="margin:0;font-size:15px;line-height:1.6;color:#b4b1d4;">'+esc(tk.policy)+'</p>'+
      '</div>'+
      '<div style="text-align:center;margin-top:26px;"><button data-action="restart" style="padding:13px 32px;border:2px solid #191246;border-radius:12px;background:#fff;color:#191246;font-size:15px;font-weight:600;cursor:pointer;">Start again</button></div>'+
    '</div>';
  }

  // ============================ PROGRESS ============================
  function renderProgress(){
    if(state.screen==='setup'){ progressEl.innerHTML=''; return; }
    var modeNames=['Typing','Camera','Voice'];
    var html = [0,1,2].map(function(i){
      var color='#d7dae2', text='#9a9aa4', done=false, current=false;
      if(state.screen==='takeaway'){ done=true; }
      else if(state.screen==='rewrite'){ done=(i===0); }
      else if(state.screen==='choice'||state.screen==='find'||state.screen==='receipt'){ done=i<state.ri; current=i===state.ri; }
      if(done){ color='#336633'; text='#666'; }
      if(current){ color='#191246'; text='#191246'; }
      return '<span class="p"><span class="d" style="background:'+color+';"></span><span class="t" style="color:'+text+';">'+modeNames[i]+'</span></span>';
    }).join('');
    progressEl.innerHTML = html;
  }

  // ============================ ACTIONS ============================
  function begin(){ setState({ screen:'choice', ri:0, choice:null, found:[], revealed:false, assign:{}, selChip:null, checked:false, rewriteDone:false }); }
  function choose(kind){
    var r = CONFIG.rounds[state.ri];
    var next = r.regions ? 'find' : 'receipt';
    setState({ choice:kind, screen:next, found:[], revealed:false });
  }
  function regionsOf(){ return CONFIG.rounds[state.ri].regions || []; }
  function tapRegion(idx){
    var reg = regionsOf()[idx];
    if(reg.sting && !stingUnlocked(regionsOf())) return;
    if(state.found.indexOf(idx)>=0) return;
    setState({ found: state.found.concat([idx]), lastFound: idx });
  }
  function showRest(){ setState({ revealed:true, lastFound:null, _revealAnim:true, found: regionsOf().map(function(_,i){return i;}) }); }
  function toReceipt(){ setState({ screen:'receipt' }); }
  function continueReceipt(){
    if(state.ri===0 && !state.rewriteDone){ setState({ screen:'rewrite' }); return; }
    if(state.ri < CONFIG.rounds.length-1){ setState({ ri:state.ri+1, screen:'choice', choice:null, found:[], revealed:false }); return; }
    setState({ screen:'takeaway' });
  }
  function place(i, zone){ if(state.checked || i==null) return; var a={}; for(var k in state.assign) a[k]=state.assign[k]; a[i]=zone; setState({ assign:a, selChip:null, dragI:null }); }
  function check(){ if(Object.keys(state.assign).length===CONFIG.rewrite.chips.length) setState({ checked:true }); }
  function afterRewrite(){ setState({ rewriteDone:true, ri:1, screen:'choice', choice:null, found:[], revealed:false }); }
  function restart(){ setState({ screen:'setup', ri:0, choice:null, found:[], revealed:false, assign:{}, selChip:null, checked:false, rewriteDone:false }); }

  // ============================ RENDER + WIRING ============================
  function render(){
    var s = state.screen;
    rtEntering = (s !== prevScreen); prevScreen = s;
    rtRevealAnim = (state._revealAnim === true); state._revealAnim = false;
    if(s==='setup') contentEl.innerHTML = screenSetup();
    else if(s==='choice') contentEl.innerHTML = screenChoice();
    else if(s==='find') contentEl.innerHTML = screenFind();
    else if(s==='receipt') contentEl.innerHTML = screenReceipt();
    else if(s==='rewrite') contentEl.innerHTML = screenRewrite();
    else if(s==='takeaway') contentEl.innerHTML = screenTakeaway();
    renderProgress();
    wireDnD();
  }

  // click delegation
  contentEl.addEventListener('click', function(e){
    var t = e.target.closest('[data-action]');
    if(!t) return;
    var a = t.getAttribute('data-action');
    switch(a){
      case 'begin': begin(); break;
      case 'sendIt': choose('sent'); break;
      case 'dontSend': choose('declined'); break;
      case 'tap': tapRegion(+t.getAttribute('data-idx')); break;
      case 'showRest': showRest(); break;
      case 'toReceipt': toReceipt(); break;
      case 'continueReceipt': continueReceipt(); break;
      case 'selectChip': if(!state.checked) setState({ selChip:+t.getAttribute('data-i') }); break;
      case 'check': check(); break;
      case 'afterRewrite': afterRewrite(); break;
      case 'restart': restart(); break;
    }
  });

  // click-to-place on zones (when a chip is selected)
  contentEl.addEventListener('click', function(e){
    if(state.screen!=='rewrite') return;
    var z = e.target.closest('[data-zone]');
    if(!z) return;
    if(e.target.closest('[data-action]')) return; // a chip inside; handled above
    if(state.selChip!=null) place(state.selChip, z.getAttribute('data-zone'));
  });

  // drag and drop
  function wireDnD(){
    if(state.screen!=='rewrite') return;
    var chips = contentEl.querySelectorAll('[data-action="selectChip"]');
    chips.forEach(function(c){
      c.addEventListener('dragstart', function(){ state.dragI = +c.getAttribute('data-i'); });
    });
    var zones = contentEl.querySelectorAll('[data-zone]');
    zones.forEach(function(z){
      z.addEventListener('dragover', function(e){ e.preventDefault(); });
      z.addEventListener('drop', function(e){ e.preventDefault(); place(state.dragI, z.getAttribute('data-zone')); });
    });
  }

  // ============================ INIT ============================
  render();
})();
</script>
</body>
</html>
